<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>[[${title}]]</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <h1 class="mb-4 text-center">予約編集</h1>

    <form th:action="@{/admins/club/reservations/update}" th:object="${reservation}" method="post">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{memberId}">
        <input type="hidden" th:field="*{status}">
        <input type="hidden" th:field="*{createdAt}">
        <input type="hidden" th:field="*{remarks}">

        <div class="mb-3">
            <label for="representativeName" class="form-label">代表者名</label>
            <input type="text" th:field="*{representativeName}" class="form-control" id="representativeName">
        </div>

        <div class="mb-3">
            <label for="reservationDate" class="form-label">予約日時</label>
            <input type="datetime-local" th:field="*{reservationDate}" class="form-control" id="reservationDate">
        </div>

        <div class="mb-3">
            <label for="peopleCount" class="form-label">人数</label>
            <input type="number" th:field="*{peopleCount}" class="form-control" id="peopleCount" min="1">
        </div>

        <div class="mb-3">
            <label for="phoneNumber" class="form-label">電話番号</label>
            <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber">
        </div>

        <div class="mb-3">
            <label for="courseName" class="form-label">コース名</label>
            <input type="text" th:field="*{courseName}" class="form-control" id="courseName">
        </div>

        <div class="d-flex justify-content-center gap-3">
            <button type="submit" class="btn btn-primary">更新する</button>
            <a th:href="@{/admins/club/reservations/{id}(id=${reservation.id})}" class="btn btn-secondary">戻る</a>
        </div>

    </form>

</div>

</body>
</html>
