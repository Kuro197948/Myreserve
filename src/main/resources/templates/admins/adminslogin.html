<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>管理者ログイン</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-4" style="max-width: 480px;">

  <h1 class="mb-4 text-center">管理者ログイン</h1>

  <th:block th:if="${session.loginId}">
  
    <div class="d-grid gap-2">
      <a class="btn btn-primary" th:href="@{/admins/club/memberslist}">
        会員一覧
      </a>

      <a class="btn btn-primary" th:href="@{/news}">
       新着情報一覧
      </a>
    </div>

  </th:block>

  <th:block th:unless="${session.loginId}">

    <form th:action="@{/admins/adminslogin}" th:object="${admin}" method="post">

      <!-- エラー表示 -->
      <div class="alert alert-danger"
           th:if="${#fields.hasErrors('loginId')}"
           th:errors="*{loginId}">
      </div>

      <div class="mb-3">
        <label class="form-label">ログインID</label>
        <input type="text" class="form-control" th:field="*{loginId}">
        <div class="text-danger small" th:errors="*{loginId}"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">パスワード</label>
        <input type="password" class="form-control" th:field="*{loginPass}">
        <div class="text-danger small" th:errors="*{loginPass}"></div>
      </div>

      <button class="btn btn-primary w-100" type="submit">
        ログイン
      </button>

    </form>

  </th:block>

</div>

</body>
</html>
