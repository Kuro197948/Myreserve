<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>会員ログイン</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container mt-4" style="max-width: 480px;">

  <h1 class="mb-4 text-center">会員ログイン</h1>

  <form th:action="@{/members/memberslogin}" th:object="${form}" method="post">

    <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
      <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">メールアドレス</label>
      <input type="email" class="form-control" th:field="*{email}">
      <div class="text-danger small" th:errors="*{email}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">パスワード</label>
      <input type="password" class="form-control" th:field="*{loginPass}">
      <div class="text-danger small" th:errors="*{loginPass}"></div>
    </div>

    <button class="btn btn-primary w-100" type="submit">ログイン</button>
  </form>

</div>
</body>
</html>
