<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>会員ログイン</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container mt-4" style="max-width: 480px;">

  <h1 class="mb-4 text-center">会員ログイン</h1>

  <form th:action="@{/members/memberslogin}" th:object="${form}" method="post">

    <!-- グローバルエラー（ID/パス間違いなど） -->
    <div class="alert alert-danger"
         th:if="${#fields.hasGlobalErrors()}"
         th:errors="*{global}">
      エラー
    </div>

    <div class="mb-3">
      <label class="form-label">ログインID</label>
      <input type="text" class="form-control" th:field="*{name}">
      <div class="text-danger small" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">パスワード</label>
      <input type="password" class="form-control" th:field="*{loginPass}">
      <div class="text-danger small" th:errors="*{loginPass}"></div>
    </div>

    <button class="btn btn-primary w-100" type="submit">ログイン</button>
  </form>

</div>
</body>
</html>
