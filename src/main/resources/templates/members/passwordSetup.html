<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>パスワード設定</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>

<div class="container mt-4" style="max-width:480px">

<h2 class="mb-4">パスワード設定</h2>

<form th:action="@{/members/password/setup}" th:object="${form}" method="post">

<input type="hidden" th:field="*{token}">

<div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
  <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
</div>

<div class="mb-3">
<label class="form-label">パスワード</label>
<input type="password" class="form-control" th:field="*{password}">
<div class="text-danger small" th:errors="*{password}"></div>
</div>

<div class="mb-3">
<label class="form-label">確認用パスワード</label>
<input type="password" class="form-control" th:field="*{confirmPassword}">
<div class="text-danger small" th:errors="*{confirmPassword}"></div>
</div>

<button class="btn btn-primary w-100">設定</button>

</form>

</div>

</body>
</html>
