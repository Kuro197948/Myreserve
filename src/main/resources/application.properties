spring.application.name=gamebarsmemberclub
# URL \u672b\u5c3e\u306e jsessionid \u3078\u306e\u5bfe\u5fdc
server.servlet.session.tracking-modes=cookie
#\u30c7\u30fc\u30bf\u30d9\u30fc\u30b9\u63a5\u7d9a\u8a2d\u5b9a
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/gamebarmemberdb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
spring.datasource.username=root
spring.datasource.password=

# MyBatis \u306e\u8a2d\u5b9a
mybatis.mapper-locations=classpath*:/mybatis/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.example.app.domain
mybatis.configuration.map-underscore-to-camel-case=true

# \u30d5\u30a1\u30a4\u30eb\u30b5\u30a4\u30ba\u306e\u8a2d\u5b9a
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

app.member.common-password=1234
spring.messages.basename=messages
logging.level.org.springframework.context.support=DEBUG
logging.level.org.springframework.security=DEBUG
spring.mvc.log-request-details=true
logging.level.org.springframework.web.servlet.handler=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=DEBUG